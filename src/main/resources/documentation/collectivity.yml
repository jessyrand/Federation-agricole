          example: 1
        nom:
          type: string
          example: "Collectivité Vakinankaratra"
        specialite:
          type: string
          example: "Riziculture"
        ville:
          type: string
          example: "Antsirabe"
        date_creation:
          type: string
          format: date
        statut:
          type: string
          enum: [en_attente, autorisee, refusee]
          example: autorisee
        nombre_membres_actifs:
          type: integer
          example: 24

    CollectiviteListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/CollectiviteResponse'

    InfoPersonnelle:
      type: object
      required: [prenom, nom, date_naissance, genre, adresse, profession, telephone, email]
      properties:
        prenom:
          type: string
        nom:
          type: string
        date_naissance:
          type: string
          format: date
        genre:
          type: string
          enum: [M, F]
        adresse:
          type: string
        profession:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        date-adhesion:
          type: string
          format: date

    PaiementAdhesion:
      type: object
      required: [montant, methode]
      properties:
        montant:
          type: integer
          example: 50000
          description: Frais d'adhésion en MGA
        methode:
          type: string
          enum: [mobile_money, virement_bancaire]
          description: Espèces non acceptées pour l'adhésion
        reference_transaction:
          type: string
          example: OM-2024-55501

    AdmissionRequest:
      type: object
      required: [candidat, parrain_id, paiement]
      properties:
        candidat:
          $ref: '#/components/schemas/InfoPersonnelle'
        parrain_id:
          type: integer
          description: Identifiant du membre confirmé parrain (ancienneté > 90 jours requise)
          example: 12
        paiement:
          $ref: '#/components/schemas/PaiementAdhesion'


    MembreResponse:
      type: object
      properties:
        id:
          type: integer
          example: 42
        prenom:
          type: string
        nom:
          type: string
        date_naissance:
          type: string
          format: date
        genre:
          type: string
          enum: [M, F]
        adresse:
          type: string
        profession:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        date_adhesion:
          type: string
          format: date
        poste:
          type: string
          enum: [president, vice_president, tresorier, secretaire, membre_confirme, membre_junior]
        collectivite_id:
          type: integer
        statut:
          type: string
          enum: [actif, demissionne]

    MembreListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/MembreResponse'


    PaiementRequest:
      type: object
      required: [membre_id, montant, date_encaissement, methode, type, compte_destination_id]
      properties:
        membre_id:
          type: integer
          example: 12
        montant:
          type: integer
          example: 20000
          description: Montant en MGA
        date_encaissement:
          type: string
          format: date
        methode:
          type: string
          enum: [especes, virement_bancaire, mobile_money]
        type:
          type: string
          enum: [mensuel, annuel, ponctuel]
          description: "mensuel/annuel = cotisation périodique, ponctuel = événement spécifique"
        compte_destination_id:
          type: integer
          description: Compte sur lequel le montant est crédité
          example: 7
        libelle:
          type: string
          description: Description libre (utile pour les paiements ponctuels)
          example: "Contribution sortie terrain avril 2024"

    PaiementResponse:
      type: object
      properties:
        id:
          type: integer
        membre_id:
          type: integer
        collectivite_id:
          type: integer
        montant:
          type: integer
        date_encaissement:
          type: string
          format: date
        methode:
          type: string
          enum: [especes, virement_bancaire, mobile_money]
        type:
          type: string
          enum: [mensuel, annuel, ponctuel]
        compte_destination_id:
          type: integer
        montant_reversement_federation:
          type: integer
          nullable: true
          description: Montant du pourcentage reversé à la fédération (cotisations périodiques uniquement)
        libelle:
          type: string
          nullable: true

    PaiementListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaiementResponse'


    CompteRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [caisse, bancaire, mobile_money]
        titulaire:
          type: string
          description: Obligatoire pour bancaire et mobile_money
        nom_banque:
          type: string
          enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCÈS BANQUE, BAOBAB, SIPEM]
          description: Obligatoire pour type = bancaire
        numero_compte:
          type: string
          pattern: '^\d{23}$'
          description: "Format BBBBBGGGGGCCCCCCCCCCCCKK — 23 chiffres. Obligatoire pour type = bancaire"
          example: "00005000010000000123412"
        service:
          type: string
          enum: [Orange Money, Mvola, Airtel Money]
          description: Obligatoire pour type = mobile_money
        telephone:
          type: string
          description: Numéro unique associé au compte. Obligatoire pour type = mobile_money
          example: "+261341234567"

    CompteResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [caisse, bancaire, mobile_money]
        solde:
          type: number
          format: float
          description: Solde actuel en MGA
          example: 1250000.0
        devise:
          type: string
          default: MGA
        titulaire:
          type: string
          nullable: true
        nom_banque:
          type: string
          nullable: true
        numero_compte:
          type: string
          nullable: true
        service:
          type: string
          nullable: true
        telephone:
          type: string
          nullable: true

    CompteListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompteResponse'


    ActiviteRequest:
      type: object
      required: [type, date_heure, obligatoire_pour, intitule]
      properties:
        type:
          type: string
          enum: [assemblee_mensuelle, formation_junior, exceptionnelle]
        intitule:
          type: string
          example: "Assemblée générale de mars 2024"
        description:
          type: string
          nullable: true
        date_heure:
          type: string
          format: date-time
        obligatoire_pour:
          type: string
          enum: [tous, juniors, confirmes, aucun]
          description: Qui est obligé d'assister à cette activité

    ActivitePatchRequest:
      type: object
      properties:
        intitule:
          type: string
        description:
          type: string
        date_heure:
          type: string
          format: date-time
        obligatoire_pour:
          type: string
          enum: [tous, juniors, confirmes, aucun]

    ActiviteFederationRequest:
      type: object
      required: [intitule, date_heure, obligatoire]
      properties:
        intitule:
          type: string
          example: "Assemblée générale annuelle 2024"
        description:
          type: string
          nullable: true
        date_heure:
          type: string
          format: date-time
        obligatoire:
          type: boolean
          description: Si true, la présence est obligatoire pour toutes les collectivités invitées
        collectivites_invitees:
          type: array
          items:
            type: integer
          description: Liste des IDs des collectivités invitées (vide = toutes)

    ActiviteResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [assemblee_mensuelle, formation_junior, exceptionnelle, federation]
        intitule:
          type: string
        description:
          type: string
          nullable: true
        date_heure:
          type: string
          format: date-time
        obligatoire_pour:
          type: string
          enum: [tous, juniors, confirmes, aucun]
        organisateur:
          type: object
          properties:
            type:
