openapi: 3.0.3
info:
  title: API Fédération Agricole Madagascar
  version: 1.0.0

servers:
  - url: https://localhost:8080/

tags:
  - name: Collectivités
    description: Création et gestion des collectivités
  - name: Membres
    description: Admission, gestion et démission des membres
  - name: Comptes
    description: Comptes de trésorerie (caisse, bancaire, mobile money)
  - name: Paiements
    description: Cotisations et encaissements
  - name: Activités
    description: Activités organisées par les collectivités ou la fédération
  - name: Présences
    description: Feuilles de présence et assiduité
  - name: Statistiques
    description: Rapports et indicateurs d'une collectivité
  - name: Fédération
    description: Comptes, activités et rapports au niveau fédération

paths:
  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister toutes les collectivités
      parameters:
        - name: ville
          in: query
          schema:
            type: string
          description: Filtrer par ville/localité
        - name: specialite
          in: query
          schema:
            type: string
          description: Filtrer par spécialité agricole
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteListResponse'

    post:
      tags: [Collectivités]
      summary: Créer une nouvelle collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteRequest'
            example:
              nom: "Collectivité Vakinankaratra"
              specialite: "Riziculture"
              ville: "Antsirabe"
              membres_fondateurs:
                - membre_id: 5
                - membre_id: 12
                - membre_id: 18
                - membre_id: 23
                - membre_id: 31
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteResponse'

        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErreurEligibilite'
              examples:
                effectif_insuffisant:
                  summary: Moins de 10 membres
                  value:
                    code: EFFECTIF_INSUFFISANT
                    message: "La collectivité doit compter au moins 10 membres."
                    details:
                      membres_fournis: 8
                      minimum_requis: 10
                anteriorite_insuffisante:
                  summary: Pas assez de membres anciens
                  value:
                    code: ANTERIORITE_INSUFFISANTE
                    message: "Au moins 5 membres doivent avoir ≥ 6 mois d'ancienneté dans la fédération."
                    details:
                      membres_anciens_fournis: 3
                      minimum_requis: 5

  /collectivites/{collectiviteId}/membres:
    get:
      tags: [Membres]
      summary: Lister les membres d'une collectivité
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - name: statut
          in: query
          schema:
            type: string
            enum: [actif, demissionne]
        - name: poste
          in: query
          schema:
            type: string
            enum: [president, vice_president, tresorier, secretaire, membre_confirme, membre_junior]
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Membres]
      summary: Admettre un nouveau membre dans une collectivité
      operationId: admettreMembre
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionRequest'
            example:
              candidat:
                prenom: Miora
                nom: Randria
                date_naissance: "1998-07-22"
                genre: F
                adresse: "Lot 12 Bis, Antsirabe"
                profession: Agricultrice
                telephone: "+261331234567"
                email: miora.randria@mail.mg
              parrain_id: 12
              paiement:
                montant: 50000
                methode: mobile_money
                reference_transaction: OM-2024-55501
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              examples:
                parrain_invalide:
                  summary: Parrain non éligible
                  value:
                    code: PARRAIN_INVALIDE
                    message: "Le parrain doit être un membre confirmé avec plus de 90 jours d'ancienneté."
                    details:
                      anciennete_parrain_jours: 45
                      minimum_requis_jours: 90
                paiement_invalide:
                  summary: Mode de paiement non accepté
                  value:
                    code: PAIEMENT_INVALIDE
                    message: "Les frais d'adhésion doivent être réglés par mobile money ou virement bancaire (pas en espèces)."
        '404':
          $ref: '#/components/responses/NotFound'

  /membres/{membreId}:
    get:
      tags: [Membres]
      summary: Consulter le profil d'un membre
      operationId: getMembre
      parameters:
        - $ref: '#/components/parameters/membreId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /membres/{membreId}/demission:
    post:
      tags: [Membres]
      summary: Enregistrer la démission d'un membre
      parameters:
        - $ref: '#/components/parameters/membreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motif]
              properties:
                motif:
                  type: string
                  example: "Déménagement à l'étranger"
                date_effective:
                  type: string
                  format: date
                  example: "2024-06-30"
      responses:
        '200':
          description: Démission enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Le membre a déjà démissionné
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'


  /collectivites/{collectiviteId}/paiements:
    get:
      tags: [Paiements]
      summary: Lister les paiements d'une collectivité
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - name: membre_id
          in: query
          schema:
            type: integer
          description: Filtrer par membre
        - name: type
          in: query
          schema:
            type: string
            enum: [mensuel, annuel, ponctuel]
          description: Filtrer par type de cotisation
        - name: date_debut
          in: query
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Liste des paiements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaiementListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Paiements]
      summary: Enregistrer un paiement / une cotisation
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaiementRequest'
            example:
              membre_id: 12
              montant: 20000
              date_encaissement: "2024-03-05"
              methode: especes
              type: mensuel
              compte_destination_id: 7
      responses:
        '201':
          description: Paiement enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaiementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/comptes:
    get:
      tags: [Comptes]
      summary: Lister les comptes d'une collectivité
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - name: type
          in: query
          schema:
            type: string
            enum: [caisse, bancaire, mobile_money]
      responses:
        '200':
          description: Liste des comptes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Comptes]
      summary: Créer un compte pour une collectivité
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
            examples:
              compte_bancaire:
                summary: Compte bancaire
                value:
                  type: bancaire
                  titulaire: "Jean Rakotobe"
                  nom_banque: BOA
                  numero_compte: "00005000010000000123412"
              compte_mobile:
                summary: Compte mobile money
                value:
                  type: mobile_money
                  titulaire: "Jean Rakotobe"
                  service: Orange Money
                  telephone: "+261341234567"
              caisse:
                summary: Caisse
                value:
                  type: caisse
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '400':
          description: Compte invalide ou caisse déjà existante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              examples:
                caisse_existante:
                  value:
                    code: CAISSE_EXISTANTE
                    message: "Cette collectivité possède déjà une caisse."
                numero_compte_invalide:
                  value:
                    code: NUMERO_COMPTE_INVALIDE
                    message: "Le numéro de compte doit respecter le format BBBBBGGGGGCCCCCCCCCCCCKK (23 chiffres)."
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/comptes/{compteId}:
    get:
      tags: [Comptes]
      summary: Consulter un compte
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - $ref: '#/components/parameters/compteId'
      responses:
        '200':
          description: Détail du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes:
    get:
      tags: [Fédération, Comptes]
      summary: Lister les comptes de la fédération
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [caisse, bancaire, mobile_money]
      responses:
        '200':
          description: Liste des comptes de la fédération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteListResponse'

    post:
      tags: [Fédération, Comptes]
      summary: Créer un compte pour la fédération
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/comptes/{compteId}:
    get:
      tags: [Fédération, Comptes]
      summary: Consulter un compte de la fédération
      parameters:
        - $ref: '#/components/parameters/compteId'
      responses:
        '200':
          description: Détail du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '404':
          $ref: '#/components/responses/NotFound'


  /collectivites/{collectiviteId}/activites:
    get:
      tags: [Activités]
      summary: Lister les activités d'une collectivité
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - name: type
          in: query
          schema:
            type: string
            enum: [assemblee_mensuelle, formation_junior, exceptionnelle]
        - name: date_debut
          in: query
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Activités]
      summary: Créer une activité pour une collectivité
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteRequest'
            examples:
              assemblee:
                summary: Assemblée générale mensuelle
                value:
                  type: assemblee_mensuelle
                  date_heure: "2024-03-10T09:00:00"
                  obligatoire_pour: tous
                  intitule: "Assemblée générale de mars 2024"
              formation:
                summary: Formation obligatoire juniors
                value:
                  type: formation_junior
                  date_heure: "2024-03-23T08:00:00"
                  obligatoire_pour: juniors
                  intitule: "Formation technique riziculture"
              exceptionnelle:
                summary: Activité exceptionnelle
                value:
                  type: exceptionnelle
                  date_heure: "2024-04-15T14:00:00"
                  obligatoire_pour: tous
                  intitule: "Visite d'une exploitation modèle"
                  description: "Déplacement vers la ferme pilote de Betafo."
      responses:
        '201':
          description: Activité créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites/{activiteId}:
    get:
      tags: [Activités]
      summary: Consulter une activité
      operationId: getActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - $ref: '#/components/parameters/activiteId'
      responses:
        '200':
          description: Détail de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/activites:
    get:
      tags: [Fédération, Activités]
      summary: Lister les activités planifiées par la fédération
      operationId: listerActivitesFederation
      parameters:
        - name: date_debut
          in: query
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Liste des activités de la fédération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteListResponse'

    post:
      tags: [Fédération, Activités]
      summary: Planifier une activité fédérale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteFederationRequest'
            example:
              intitule: "Assemblée générale annuelle 2024"
              date_heure: "2024-12-07T09:00:00"
              obligatoire: true
              collectivites_invitees: [1, 2, 3, 4]
      responses:
        '201':
          description: Activité fédérale créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/activites/{activiteId}:
    get:
      tags: [Fédération, Activités]
      summary: Consulter une activité fédérale
      parameters:
        - $ref: '#/components/parameters/activiteId'
      responses:
        '200':
          description: Détail de l'activité fédérale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '404':
          $ref: '#/components/responses/NotFound'


  /activites/{activiteId}/presences:
    get:
      tags: [Présences]
      summary: Consulter la feuille de présence d'une activité
      parameters:
        - $ref: '#/components/parameters/activiteId'
      responses:
        '200':
          description: Feuille de présence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Présences]
      summary: Enregistrer la feuille de présence d'une activité
      parameters:
        - $ref: '#/components/parameters/activiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceRequest'
            example:
              presences:
                - membre_id: 5
                  statut: present
                - membre_id: 12
                  statut: excuse
                  motif_absence: "Déplacement professionnel"
                - membre_id: 18
                  statut: absent
                - membre_id: 99
                  statut: visiteur
                  collectivite_origine_id: 3
      responses:
        '201':
          description: Présences enregistrées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Feuille de présence déjà enregistrée pour cette activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              example:
                code: PRESENCE_DEJA_ENREGISTREE
                message: "La feuille de présence de cette activité a déjà été soumise."

  /collectivites/{collectiviteId}/statistiques:
    get:
      tags: [Statistiques]
      summary: Statistiques agrégées d'une collectivité
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-31"
      responses:
        '200':
          description: Statistiques agrégées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesCollectiviteResponse'
              example:
                collectivite_id: 1
                periode:
                  date_debut: "2024-01-01"
                  date_fin: "2024-01-31"
                taux_assiduite_global: 85.0
                nombre_membres_actifs: 24
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/statistiques/membres:
    get:
      tags: [Statistiques]
      summary: Statistiques détaillées par membre actif
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Statistiques détaillées par membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesMembresResponse'
              example:
                collectivite_id: 1
                periode:
                  date_debut: "2024-01-01"
                  date_fin: "2024-01-31"
                membres:
                  - membre_id: 5
                    nom_complet: "Jean Rakotobe"
                    taux_assiduite: 100.0
                    montant_encaisse: 20000
                    montant_impaye: 0
                  - membre_id: 12
                    nom_complet: "Miora Randria"
                    taux_assiduite: 66.7
                    montant_encaisse: 0
                    montant_impaye: 20000
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/rapports:
    get:
      tags: [Statistiques]
      summary: Lister les rapports mensuels soumis à la fédération
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
        - name: annee
          in: query
          schema:
            type: integer
            example: 2024
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Liste des rapports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportCollectiviteListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Statistiques]
      summary: Soumettre le rapport mensuel à la fédération
      parameters:
        - $ref: '#/components/parameters/collectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RapportCollectiviteRequest'
            example:
              mois: 3
              annee: 2024
              taux_assiduite_global: 85.0
              nombre_membres_actifs: 24
              commentaire: "Légère baisse due aux congés agricoles de fin de saison."
      responses:
        '201':
          description: Rapport soumis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportCollectiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Rapport déjà soumis pour ce mois
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              example:
                code: RAPPORT_EXISTANT
                message: "Un rapport pour mars 2024 a déjà été soumis."

components:

  parameters:
    collectiviteId:
      name: collectiviteId
      in: path
      required: true
      schema:
        type: integer
        example: 1

    membreId:
      name: membreId
      in: path
      required: true
      schema:
        type: integer
        example: 12

    compteId:
      name: compteId
      in: path
      required: true
      schema:
        type: integer
        example: 5

    paiementId:
      name: paiementId
      in: path
      required: true
      schema:
        type: integer
        example: 101

    activiteId:
      name: activiteId
      in: path
      required: true
      schema:
        type: integer
        example: 20

    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    MembreFondateur:
      type: object
      required: [membre_id]
      properties:
        membre_id:
          type: integer

    CollectiviteRequest:
      type: object
      required: [nom, specialite, ville, membres_fondateurs]
      properties:
        nom:
          type: string
          example: "Collectivité Vakinankaratra"
        specialite:
          type: string
          description: Spécialité agricole principale
          example: "Riziculture"
        ville:
          type: string
          example: "Antsirabe"
        membres_fondateurs:
          type: array
          minItems: 10
          description: Liste des membres fondateurs (minimum 10, dont 5 avec ≥ 6 mois d'ancienneté)
          items:
            $ref: '#/components/schemas/MembreFondateur'

    CollectivitePatchRequest:
      type: object
