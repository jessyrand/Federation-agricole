          type: integer
        page:
          type: integer
        limit:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/RapportCollectiviteResponse'
    Erreur:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    ErreurEligibilite:
      allOf:
        - $ref: '#/components/schemas/Erreur'
        - type: object
          properties:
            details:
              type: object
              additionalProperties: true

  responses:
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
          example:
            code: NOT_FOUND
            message: "La ressource demandée est introuvable."

    BadRequest:
      description: Paramètres invalides
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
          example:
            code: PARAMETRE_INVALIDE
            message: "Un ou plusieurs paramètres sont invalides."

    UnprocessableEntity:
      description: Données métier incohérentes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
