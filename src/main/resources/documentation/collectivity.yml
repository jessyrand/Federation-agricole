            id:
              type: integer
              nullable: true
        feuille_presence_soumise:
          type: boolean

    ActiviteListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/ActiviteResponse'


    PresenceEntry:
      type: object
      required: [membre_id, statut]
      properties:
        membre_id:
          type: integer
        statut:
          type: string
          enum: [present, excuse, absent, visiteur]
          description: |
            - `present` : membre présent
            - `excuse` : absent avec motif transmis avant l'activité
            - `absent` : absent sans motif
            - `visiteur` : membre d'une autre collectivité (ne compte pas dans son taux d'assiduité)
        motif_absence:
          type: string
          nullable: true
          description: Requis si statut = excuse
        collectivite_origine_id:
          type: integer
          nullable: true
          description: Requis si statut = visiteur

    PresenceRequest:
      type: object
      required: [presences]
      properties:
        presences:
          type: array
          items:
            $ref: '#/components/schemas/PresenceEntry'

    PresenceListResponse:
      type: object
      properties:
